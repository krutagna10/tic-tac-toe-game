<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utility.css">
    <title>Tic Tac Toe</title>
</head>
<body>

<main>
    <section class="choice-section">
        <div class="choice container flow border-radius">
            <div class="choice__logo-wrapper">
                <a href="#" class="choice__logo">
                    <img src="images/logo.svg" alt="Logo" class="margin-auto">
                </a>
            </div>

            <div class="choice__mark-select background-semi-dark-navy flow text-align-center border-radius">
                <p class="choice__mark-select-text font-size-200 text-color-silver uppercase font-weight-bold">
                    Pick player 1's mark
                </p>
                <div class="choice__marks-wrapper background-dark-navy grid grid--2-columns border-radius">
                    <button class="choice__mark-btn choice__mark-btn--x">
                        <img class="choice__mark-icon" src="images/icon-x-silver.svg" alt="x icon">
                    </button>
                    <button class="choice__mark-btn choice__mark-btn--o choice__mark-btn--active">
                        <img class="choice__mark-icon" src="images/icon-o-dark-navy.svg" alt="o icon">
                    </button>
                </div>
                <p class="choice__mark-select-text font-size-100 uppercase">
                    Remember: X goes first
                </p>
            </div>

            <button class="choice__game-btn choice__game-btn--pvp btn font-size-300 background-light-yellow text-color-dark-navy uppercase font-weight-bold border-radius">
                New Game (vs CPU)
            </button>
            <button class="choice__game-btn choice__game-btn--pvc btn font-size-300 background-light-blue text-color-dark-navy uppercase font-weight-bold border-radius">
                New Game (vs player)
            </button>
        </div>
    </section>

    <section class="game-section">
        <div class="container game flow">
            <header class="game__header flex flex--justify-space-between flex--align-center">
                <div class="game__header-logo-wrapper">
                    <a href="#" class="game__header-logo-wrapper">
                        <img class="game__header-logo" src="images/logo.svg" alt="Game Logo">
                    </a>
                </div>
                <div class="game__current-turn background-semi-dark-navy border-radius flex flex--align-center flex--justify-center flex--gap">
                    <img class="current-turn__icon" src="images/icon-o-silver.svg" alt="turn-icon">
                    <p class="text-color-silver font-size-200 uppercase">Turn</p>
                </div>
                <button class="game__restart-btn btn background-silver border-radius">
                    <img class="game__restart-icon" src="images/icon-restart.svg" alt="restart-icon">
                </button>
            </header>

            <div class="game__board grid grid--3-columns grid--gap">
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
                <button class="game__card grid grid--place-center">
                    <span class="game__card-hover-icon-wrapper">
                        <img src="images/icon-o-outline.svg" alt="hover-icon" class="game__card-hover-icon">
                    </span>
                </button>
            </div>

            <div class="game__scores text-color-dark-navy text-align-center flex flex--gap flex--justify-space-between">
                <div class="game__score-box game__score-box--x background-light-blue border-radius">
                    <p class="uppercase font-size-100 font-weight-bold">
                        X<span class="game__user--x">(CPU)</span>
                    </p>
                    <p class="game__score game__score--x font-weight-bold font-size-400">0</p>
                </div>
                <div class="game__score-box game__score-box--ties background-silver border-radius">
                    <p class="uppercase font-size-100 font-weight-bold">Ties</p>
                    <p class="game__score game__score--ties font-weight-bold font-size-400">0</p>
                </div>
                <div class="game__score-box game__score-box--o background-light-yellow border-radius">
                    <p class="uppercase font-size-100 font-weight-bold">
                        O<span class="game__user--o">(You)</span>
                    </p>
                    <p class="game__score game__score--o font-weight-bold font-size-400">0</p>
                </div>
            </div>

            <div class="game__overlay hidden"></div>
        </div>

        <div class="game__thinking-text-wrapper">
            <p class="game__thinking-text font-size-100 text-color-silver uppercase text-align-center">
                Your opponent is thinking ...
            </p>
        </div>
    </section>
</main>

<section class="restart-section background-semi-dark-navy">
    <div class="restart-game container grid grid--gap grid--place-center">
        <p class="restart-game__title text-align-center font-weight-bold font-size-500 text-color-silver uppercase">
            Restart Game?</p>
        <div class="restart-game__buttons flex flex--gap">
            <button class="restart-game__button--cancel font-weight-bold btn font-size-200 uppercase background-silver text-color-dark-navy border-radius">
                No, Cancel
            </button>
            <button class="restart-game__button-restart font-weight-bold btn font-size-200 uppercase background-light-yellow text-color-dark-navy border-radius">
                Yes, Restart
            </button>
        </div>
    </div>
</section>

<section class="game-finish-section background-semi-dark-navy">
    <div class="game-finish container flow grid grid--place-center text-align-center">
        <div class="game-finish__result-wrapper flow">
            <p class="game-finish__result text-color-silver font-size-200 uppercase">You Won !</p>
            <div class="game-finish__result-description flex flex--gap flex-align--center">
                <img class="game-finish__result-icon" src="images/icon-o.svg" alt="icon">
                <p class="game-finish__text font-size-500 text-color-light-yellow uppercase">
                    Takes the round
                </p>
            </div>
        </div>

        <div class="game-finish__result-description--draw">
            <p class="game-finish__text font-weight-bold font-size-500 text-color-silver uppercase">
                Round Tied
            </p>
        </div>

        <div class="buttons-wrapper flex flex--gap">
            <button class="quit-button font-weight-bold btn font-size-200 uppercase background-silver text-color-dark-navy border-radius">
                Quit
            </button>
            <button class="next-round-button font-weight-bold btn font-size-200 uppercase background-light-yellow text-color-dark-navy border-radius">
                Next Round
            </button>
        </div>
    </div>
</section>


<div class="overlay hidden"></div>
<script src="javascript/script.js"></script>

</body>
</html>
